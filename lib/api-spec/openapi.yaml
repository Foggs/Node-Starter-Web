openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Exit Coach API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ping
    description: Keep-alive operations
  - name: session
    description: Session state management
  - name: consent
    description: Biometric consent capture (BIPA/GDPR)
  - name: voice
    description: Voice cloning and TTS operations
  - name: coaching
    description: Practice session, transcription, and coaching operations
  - name: report
    description: PDF coaching report generation
  - name: leads
    description: Lead capture from anonymous landing-page visitors

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ping:
    get:
      operationId: ping
      tags: [ping]
      summary: Keep-alive ping
      description: Resets session expiry to prevent Replit cold starts during active sessions
      responses:
        "200":
          description: Pong
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok

  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Capture a lead from the landing-page demo modal
      description: |
        Public endpoint — no session cookie required. The express-session
        middleware mints a session cookie on the response so the caller can
        navigate straight into POST /api/consent next.

        Duplicate emails are silently de-duplicated (still 201) and skip the
        Sheets append. All Sheets errors map to a generic 500 with no detail
        leak. Per-IP rate limit: 5 requests per hour.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadRequest"
      responses:
        "201":
          description: Lead captured (or silently de-duplicated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded for this IP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error (Sheets unreachable or misconfigured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scenarios:
    get:
      operationId: listScenarios
      tags: [session]
      summary: List all practice scenarios
      description: Returns the 4 built-in practice scenarios. No session required.
      responses:
        "200":
          description: Array of scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scenario"

  /personas:
    get:
      operationId: listPersonas
      tags: [session]
      summary: List all employee personas
      description: Returns the 5 built-in employee personas. No session required.
      responses:
        "200":
          description: Array of personas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Persona"

  /session:
    get:
      operationId: getSession
      tags: [session]
      summary: Get current session state
      description: Returns sanitised session state. voice_id is never returned to the frontend.
      responses:
        "200":
          description: Current session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateSession
      tags: [session]
      summary: Update scenario or persona selection
      description: Stores the selected scenario and/or persona in the server-side session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scenario:
                  type: string
                persona:
                  type: string
      responses:
        "200":
          description: Updated session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionState"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /session/ready:
    get:
      operationId: getSessionReady
      tags: [session]
      summary: Probe whether onboarding is complete
      description: |
        Runs the same readiness gate (`checkSessionReady`) used by all
        session-action endpoints (coaching-tip, employee-turn, improved-replay,
        feedback-summary). Returns 204 when every onboarding step is
        complete; otherwise returns 400 with the canonical `missingStep`
        (1=consent, 2=scenario, 3=persona, 4=voice). The client uses this
        single signal to drive the redirect interstitial so the gate reason
        always matches what the gated POST endpoints would say.
      responses:
        "204":
          description: All onboarding steps complete; session may proceed
        "400":
          description: Onboarding incomplete; see missingStep for the first failing step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionReadyError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /consent:
    post:
      operationId: recordConsent
      tags: [consent]
      summary: Record biometric consent
      description: |
        Logs timestamped biometric consent before any voice recording begins.
        Required by BIPA and GDPR before collecting any voice biometric data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentRequest"
      responses:
        "200":
          description: Consent recorded with server timestamp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /clone-voice:
    post:
      operationId: cloneVoice
      tags: [voice]
      summary: Clone the manager's voice
      description: |
        Accepts a 30-60s audio recording and creates an ElevenLabs Instant Voice Clone.
        The resulting voice_id is stored in the server-side session only — never returned to the frontend.
        Falls back to a generic voice if cloning fails.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
                  description: Manager's voice recording (30-60 seconds of natural speech)
              required:
                - audio
      responses:
        "200":
          description: Voice clone created or fallback triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloneVoiceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /voice:
    delete:
      operationId: discardVoice
      tags: [voice]
      summary: Discard the cloned voice
      description: |
        Removes the cloned voice from ElevenLabs and clears it from the session,
        allowing the manager to re-record. Both voice_id and voice_cloned are reset
        to undefined (not false), so voice_step_completed returns false and the
        Continue button becomes disabled until a new recording reaches a terminal state.
      responses:
        "200":
          description: Voice discarded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: ElevenLabs deletion failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /voice/preview:
    get:
      operationId: getVoicePreview
      tags: [voice]
      summary: Play a TTS sample in the cloned voice
      description: Synthesises a short sample phrase in the manager's cloned voice for confirmation
      responses:
        "200":
          description: Audio sample in the cloned voice
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /coaching-tip:
    post:
      operationId: getCoachingTip
      tags: [coaching]
      summary: Transcribe audio and return a coaching tip
      description: |
        Transcribes the manager's recorded turn with OpenAI Whisper,
        then uses GPT-4o-mini to return a coaching tip (strengths + improvement)
        and an emotion score (1-10) for the employee's simulated emotional state.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CoachingTipRequest"
      responses:
        "200":
          description: Transcript, coaching tip, and emotion score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoachingTipResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /employee-turn:
    post:
      operationId: generateEmployeeTurn
      tags: [coaching]
      summary: Generate the next employee turn
      description: |
        Uses GPT-4o-mini with the persona's system prompt and the full conversation
        history to generate the employee's next utterance. The result is stored in
        the server-side session as an employee turn. Call once before each manager
        recording round (including the very first turn).
      responses:
        "200":
          description: Employee turn transcript and turn index
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeTurnResponse"
        "400":
          description: Session not configured or session already complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /employee-voice:
    post:
      operationId: synthesizeEmployeeVoice
      tags: [coaching]
      summary: Synthesize the employee's latest turn as audio
      description: |
        Synthesizes the most recent pending employee turn as TTS audio using the
        persona-matched built-in ElevenLabs voice. The audio buffer is stored in
        the server-side session and an audio URL is returned. Call immediately
        after POST /api/employee-turn resolves. Degrades gracefully on failure —
        callers should fall back to text-only mode on 502.
      responses:
        "200":
          description: Audio URL for the synthesized employee turn
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeVoiceResponse"
        "400":
          description: No pending employee turn to synthesize
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: ElevenLabs voice service unavailable — degrade to text-only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /improved-replay:
    post:
      operationId: generateImprovedReplay
      tags: [coaching]
      summary: Generate improved replay of the session
      description: |
        Rewrites all manager turns using GPT-4o-mini, then generates TTS audio
        for each rewritten turn in the manager's cloned voice.
        Progressive generation begins after turn 1 to hide end-of-session latency.
      responses:
        "200":
          description: Array of improved turns with transcripts and audio URLs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImprovedTurn"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /feedback-summary:
    post:
      operationId: generateFeedbackSummary
      tags: [coaching]
      summary: Generate session feedback summary
      description: |
        Produces a strengths-first coaching summary for the completed session,
        including per-turn recap, areas for improvement, qualitative assessment,
        and an emotion arc array for charting.
      responses:
        "200":
          description: Feedback summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /export-report:
    post:
      operationId: exportReport
      tags: [report]
      summary: Export anonymised PDF coaching report
      description: |
        Generates a one-page anonymised coaching report as a PDF.
        Contains no PII, no voice data. Safe to share with HR or a coach.
      responses:
        "200":
          description: PDF coaching report
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

  /audio/{turnId}:
    get:
      operationId: getAudio
      tags: [coaching]
      summary: Serve generated improved-replay audio
      description: Returns the audio file for a specific improved-replay turn
      parameters:
        - name: turnId
          in: path
          required: true
          schema:
            type: string
          description: Identifier of the generated audio turn
      responses:
        "200":
          description: Audio file for the specified turn
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  responses:
    Unauthorized:
      description: No active session
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            required:
              - error

  schemas:
    ErrorResponse:
      type: object
      description: Generic error response body
      properties:
        error:
          type: string
          description: Human-readable error message
      required:
        - error

    SessionReadyError:
      type: object
      description: 400 body returned by the readiness gate when onboarding is incomplete
      properties:
        error:
          type: string
        missingStep:
          type: integer
          enum: [1, 2, 3, 4]
          description: |
            First incomplete onboarding step in canonical order:
            1 = Biometric consent, 2 = Scenario, 3 = Persona, 4 = Voice.
      required:
        - error
        - missingStep

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LeadRequest:
      type: object
      description: Lead capture from the landing-page demo modal
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Visitor's full name (will be trimmed)
        email:
          type: string
          format: email
          maxLength: 254
          description: Visitor's email address (will be lowercased)
      required:
        - name
        - email

    LeadResponse:
      type: object
      description: 201 body — true even when the email was a duplicate
      properties:
        success:
          type: boolean
      required:
        - success

    Scenario:
      type: object
      properties:
        id:
          type: string
          description: Unique scenario identifier
          enum:
            - performance_issue
            - layoff
            - misconduct
            - pip_failure
        name:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - description

    Persona:
      type: object
      properties:
        id:
          type: string
          description: Unique persona identifier
          enum:
            - tearful
            - defensive
            - withdrawn
            - professional
            - angry
        name:
          type: string
        emotionalStyle:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - emotionalStyle
        - description

    Turn:
      type: object
      description: A single conversation turn in the practice session
      properties:
        turn_index:
          type: integer
          minimum: 1
          maximum: 5
        role:
          type: string
          enum:
            - employee
            - manager
        transcript:
          type: string
          maxLength: 2000
        coaching_tip:
          type: string
          description: Present on manager turns only
        emotion_score:
          type: integer
          minimum: 1
          maximum: 10
          description: Employee emotional intensity (1=calm, 10=highly distressed/angry). Present on employee turns only.
      required:
        - turn_index
        - role
        - transcript

    SessionState:
      type: object
      description: Sanitised session state — voice_id is never included
      properties:
        consent_given:
          type: boolean
        voice_cloned:
          type: boolean
        voice_id_present:
          type: boolean
          description: Whether a voice_id exists in the session (the ID itself is never returned)
        voice_step_completed:
          type: boolean
          description: >
            True when the voice step is done — either a voice was cloned
            successfully or the user accepted the generic-voice fallback.
            False when the step has not been reached or after the voice was discarded.
        scenario:
          type: string
          nullable: true
        persona:
          type: string
          nullable: true
        turns:
          type: array
          items:
            $ref: "#/components/schemas/Turn"
      required:
        - consent_given
        - voice_cloned
        - voice_id_present
        - voice_step_completed
        - turns

    CloneVoiceResponse:
      type: object
      properties:
        success:
          type: boolean
        fallback:
          type: boolean
          description: True when voice cloning failed and a generic ElevenLabs voice will be used instead
      required:
        - success
        - fallback

    ConsentRequest:
      type: object
      properties:
        consentGiven:
          type: boolean
          description: Must be true; server rejects false
      required:
        - consentGiven

    ConsentResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Server-side ISO 8601 timestamp of when consent was recorded
      required:
        - timestamp

    CoachingTipRequest:
      type: object
      properties:
        audio:
          type: string
          format: binary
          description: Manager's recorded audio turn (WebM, MP4, or OGG)
        turnIndex:
          type: integer
          minimum: 1
          maximum: 5
          description: Turn number (1–5)
      required:
        - audio
        - turnIndex

    CoachingTipResponse:
      type: object
      properties:
        transcript:
          type: string
          description: Whisper-transcribed text of the manager's turn
        coachingTip:
          type: string
          description: GPT-4o-mini coaching tip (strength + improvement) for this turn
        emotionScore:
          type: integer
          minimum: 1
          maximum: 10
          description: Simulated employee emotional intensity score
      required:
        - transcript
        - coachingTip
        - emotionScore

    EmployeeTurnResponse:
      type: object
      description: The employee's generated turn text and its position in the session
      properties:
        transcript:
          type: string
          description: The employee's generated utterance for this turn
        turnIndex:
          type: integer
          minimum: 1
          maximum: 5
          description: The manager turn number this employee turn precedes (1-5)
      required:
        - transcript
        - turnIndex

    EmployeeVoiceResponse:
      type: object
      description: Audio URL for the synthesized employee turn
      properties:
        audioUrl:
          type: string
          description: Relative URL to the generated TTS audio file for the employee turn
      required:
        - audioUrl

    ImprovedTurn:
      type: object
      description: A rewritten manager turn with optional audio URL
      properties:
        turnIndex:
          type: integer
        originalTranscript:
          type: string
        improvedTranscript:
          type: string
        audioUrl:
          type: string
          description: URL to the generated TTS audio file (available once generated)
      required:
        - turnIndex
        - originalTranscript
        - improvedTranscript

    FeedbackSummary:
      type: object
      properties:
        strengths:
          type: array
          items:
            type: string
          description: Things the manager did well across the session
        improvements:
          type: array
          items:
            type: string
          description: Specific, actionable areas for improvement
        summary:
          type: string
          description: Qualitative overall assessment of the session
        emotionArc:
          type: array
          items:
            type: integer
          description: Emotion scores (1-10) for each employee turn in sequence, used for the Emotion Arc Chart
      required:
        - strengths
        - improvements
        - summary
        - emotionArc
